<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pushkin NetOps | Dashboard</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        @keyframes pulse-blue { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-blue { animation: pulse-blue 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">
    <div class="container mx-auto p-4 lg:p-8">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 border-b border-gray-800 pb-6">
            <div>
                <h1 class="text-4xl font-black text-blue-500 tracking-tighter">🚀 PUSHKIN <span class="text-white text-lg font-light tracking-normal ml-2">NetOps Engine</span></h1>
                <p class="text-gray-400 text-sm mt-1">High-speed Eventual Consistency Orchestration</p>
            </div>
            <div class="mt-4 md:mt-0 flex gap-4">
                <div id="stats-summary" class="text-right">
                    <p class="text-xs text-gray-500 uppercase font-bold">System Status</p>
                    <p class="text-green-400 font-mono text-sm">● All Workers Online</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left Panel: Control Center -->
            <div class="lg:col-span-4 space-y-6">
                <section class="bg-gray-800 p-6 rounded-2xl shadow-2xl border border-gray-700">
                    <h2 class="text-xl font-bold mb-6 flex items-center">
                        <span class="w-2 h-6 bg-blue-500 rounded mr-3"></span> Fast Config Deployment
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Target IP Address</label>
                            <input id="target-ip" type="text" placeholder="10.0.0.1" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Abstract Action</label>
                            <select id="action-select" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                                <option value="create_vlan">Create VLAN</option>
                                <option value="delete_vlan">Delete VLAN</option>
                                <option value="tag_port">Tag Trunk Port</option>
                                <option value="untag_port">Set Access Port</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Parameters (JSON)</label>
                            <textarea id="params-json" rows="3" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-xl font-mono text-sm focus:ring-2 focus:ring-blue-500 outline-none transition">{ "vlan_id": 100, "vlan_name": "PROD_NET" }</textarea>
                        </div>
                        <div class="flex flex-wrap gap-4 pt-2">
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" id="check-notify" class="w-4 h-4 rounded border-gray-700 bg-gray-900 text-blue-500 focus:ring-blue-500">
                                <span class="text-sm text-gray-300">Telegram</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" id="check-backup" class="w-4 h-4 rounded border-gray-700 bg-gray-900 text-blue-500 focus:ring-blue-500">
                                <span class="text-sm text-gray-300">Auto Backup</span>
                            </label>
                        </div>
                        <button onclick="firePushkin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl shadow-lg transform active:scale-95 transition duration-150 uppercase tracking-widest">
                            Execute Fire ⚡
                        </button>
                    </div>
                </section>

                <!-- Provisioning Progress -->
                <section id="pipeline-status" class="hidden bg-gray-800 p-6 rounded-2xl border-2 border-blue-500 shadow-blue-900/20 shadow-2xl">
                    <h3 class="text-sm font-black uppercase mb-4 text-blue-400">Live Provisioning Stream</h3>
                    <div id="pipeline-nodes" class="flex items-center justify-between">
                        <!-- Dynamic Nodes -->
                    </div>
                </section>
            </div>

            <!-- Right Panel: Network Inventory -->
            <div class="lg:col-span-8">
                <div class="bg-gray-800 rounded-2xl shadow-2xl border border-gray-700 overflow-hidden">
                    <div class="p-6 border-b border-gray-700 flex justify-between items-center bg-gray-800/50">
                        <h2 class="text-xl font-bold">Network Inventory</h2>
                        <button onclick="refreshDashboard()" class="text-xs bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-full transition">↻ Sync Status</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-gray-900/50 text-gray-500 text-xs uppercase tracking-wider">
                                <tr>
                                    <th class="px-6 py-4 font-bold">Device IP</th>
                                    <th class="px-6 py-4 font-bold">Vendor</th>
                                    <th class="px-6 py-4 font-bold">ICMP</th>
                                    <th class="px-6 py-4 font-bold">SSH Status</th>
                                    <th class="px-6 py-4 font-bold">Last Seen</th>
                                    <th class="px-6 py-4 font-bold text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="inventory-table" class="divide-y divide-gray-700">
                                <!-- JS Injection -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function refreshDashboard() {
            try {
                const res = await fetch('/dashboard');
                const data = await res.json();
                const table = document.getElementById('inventory-table');
                table.innerHTML = '';

                data.devices.forEach(dev => {
                    const row = `
                        <tr class="hover:bg-gray-750 transition group">
                            <td class="px-6 py-4 font-mono text-blue-400">${dev.ip}:${dev.port}</td>
                            <td class="px-6 py-4"><span class="bg-gray-700 px-2 py-1 rounded text-[10px] uppercase font-bold">${dev.vendor}</span></td>
                            <td class="px-6 py-4">
                                <div class="w-3 h-3 rounded-full ${dev.status.icmp ? 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]' : 'bg-red-500'}"></div>
                            </td>
                            <td class="px-6 py-4">
                                <span class="text-xs ${dev.status.ssh ? 'text-green-400' : 'text-gray-500'} font-bold">
                                    ${dev.status.ssh ? 'CONNECTED' : 'DISCONNECTED'}
                                </span>
                            </td>
                            <td class="px-6 py-4 text-xs text-gray-500">${dev.status.last_check}</td>
                            <td class="px-6 py-4 text-right">
                                <button class="text-gray-400 hover:text-white transition">⚙️</button>
                            </td>
                        </tr>
                    `;
                    table.innerHTML += row;
                });
            } catch (err) { console.error("Sync Error:", err); }
        }

        async function firePushkin() {
            const ip = document.getElementById('target-ip').value;
            const action = document.getElementById('action-select').value;
            const params = JSON.parse(document.getElementById('params-json').value);
            const notify = document.getElementById('check-notify').checked;
            const backup = document.getElementById('check-backup').checked;

            if(!ip) return alert("Enter Target IP!");

            try {
                const res = await fetch('/push-abstract', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        ip: ip,
                        action: action,
                        params: params,
                        send_notify: notify,
                        make_backup: backup
                    })
                });
                const result = await res.json();
                alert(`Task Queued! Job ID: ${result.job_id}`);
            } catch (e) {
                alert("Execution Error: Check console");
            }
        }

        // Initial Load & Auto-Refresh
        refreshDashboard();
        setInterval(refreshDashboard, 15000);
    </script>
</body>
</html>
