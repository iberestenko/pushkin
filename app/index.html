<!DOCTYPE html>
<html>
<head>
    <title>Pushkin Live Terminal</title>
    <!-- Подключаем стили и скрипты Xterm.js -->
    <link rel="stylesheet" href="https://unpkg.com/@xterm/xterm/css/xterm.css" />
    <script src="https://unpkg.com/@xterm/xterm/lib/xterm.js"></script>
    <style>
        body { background: #1e1e1e; color: white; font-family: monospace; padding: 20px; }
        #terminal { width: 100%; height: 500px; }
        .controls { margin-bottom: 10px; }
        input { padding: 5px; background: #333; color: white; border: 1px solid #555; }
        button { padding: 5px 15px; background: #007acc; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="controls">
        <input type="text" id="jobId" placeholder="Job ID">
        <input type="text" id="ip" placeholder="Device IP">
        <input type="text" id="port" value="22" style="width: 50px;">
        <button onclick="connect()">Connect to Stream</button>
    </div>
    <div id="terminal"></div>

    <script>
        // 1. Инициализация терминала
        const term = new Terminal({
            theme: { background: '#1e1e1e' },
            cursorBlink: true,
            convertEol: true // Чтобы правильно обрабатывать перенос строк \n
        });
        term.open(document.getElementById('terminal'));
        term.write('Pushkin Engine Ready. Enter Job details and connect...\r\n');

        let socket;

        function connect() {
            const jobId = document.getElementById('jobId').value;
            const ip = document.getElementById('ip').value;
            const port = document.getElementById('port').value;

            term.write(`\r\n[SYSTEM] Connecting to ws://localhost:8000/ws/stream/${jobId}/${ip}/${port}...\r\n`);

            // 2. Создание WebSocket соединения
            socket = new WebSocket(`ws://localhost:8000/ws/stream/${jobId}/${ip}/${port}`);

            socket.onmessage = function(event) {
                // Пишем данные напрямую в терминал
                term.write(event.data);
            };

            socket.onclose = function() {
                term.write('\r\n[SYSTEM] Connection closed.\r\n');
            };

            socket.onerror = function(error) {
                term.write('\r\n[SYSTEM] WebSocket Error!\r\n');
            };
        }
    </script>
</body>
</html>
